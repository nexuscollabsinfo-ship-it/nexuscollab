<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>NEXUS COLLABS | Global Digital Agency</title>
    <meta name="description" content="NEXUS COLLABS - A centralized worldwide digital service agency connecting premium clients with elite digital talent. 100+ services across 156 countries." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preconnect to external domains -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical assets -->
    <link rel="preload" href="/images/nexus-logo.png" as="image" type="image/png" />
    <link rel="preload" href="/assets/index-C6E90v10.css" as="style" />

    <!-- Prefetch page chunks -->
    <link rel="prefetch" href="/assets/pages-ClientRequest.js" as="script" />
    <link rel="prefetch" href="/assets/pages-WorkerApplication.js" as="script" />
    <link rel="prefetch" href="/assets/pages-Dashboard.js" as="script" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/images/favicon-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="NEXUS COLLABS | Global Digital Agency" />
    <meta property="og:description" content="A centralized worldwide digital service agency connecting premium clients with elite digital talent." />
    <meta property="og:type" content="website" />

    <!-- Critical CSS for first paint -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0}
      html{background:#0a0a0a;color:#fff}
      body{font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;overflow-x:hidden}
      #root{min-height:100dvh}
      ::-webkit-scrollbar{width:5px}
      ::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:rgba(59,130,246,.25);border-radius:10px}
      .loading-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:99999;transition:opacity .3s}
      .loading-screen.hidden{opacity:0;pointer-events:none}
      .loading-ring{width:40px;height:40px;border:2px solid rgba(59,130,246,.2);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="loading" class="loading-screen">
      <div class="loading-ring"></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load',function(){var l=document.getElementById('loading');if(l)l.classList.add('hidden');setTimeout(function(){if(l)l.remove()},350)});
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
